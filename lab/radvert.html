<html>

<head>
    <meta http-equiv="refresh" content="2; url=$(link-orig)">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="-1">
    <title>Internet - Advertisement</title>
    <link rel="stylesheet" href="asstes/css/style.css">
    <script>

        var popup = '';
        function openOrig() {
            if (window.focus) popup.focus();
            location.href = unescape('$(link-orig-esc)');
        }
        function openAd() {
            location.href = unescape('$(link-redirect-esc)');
        }
        function openAdvert() {
            if (window.name != 'hotspot_advert') {
                popup = open('$(link-redirect)', 'hotspot_advert', '');
                setTimeout("openOrig()", 1000);
                return;
            }
            setTimeout("openAd()", 1000);
        }
    </script>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@200;300;400;500;600;800;900&display=swap");

        body {
            font-family: "Lexend Deca", sans-serif;
            color: white;
            overflow-x: hidden;
            width: 100vw;
            height: 100vh;
            min-width: 2.5in;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(31, 31, 31);
        }


        .container {
            width: 2.5in;
            padding: .2in;
            font-weight: 600;
            line-height: .3in;
        }

        a {
            text-decoration: none;
            color: red;
        }

        p {
            width: 100%;
            text-align: center;
            margin: 0;
        }

        .head {
            font-size: 15pt;
            color: rgb(0, 81, 255);
        }

        p:not(.head) {
            font-size: 10pt;
        }
    </style>
</head>

<body onLoad="openAdvert()">
    <div class="ie-fixMinHeight">
        <div class="main">
            <div class="wrap">
                <h1>Advertisement</h1>
                <p class="info">If nothing happens, open <a href="$(link-redirect)"
                        target="hotspot_advert">advertisement</a> manually.</p>
            </div>
        </div>
    </div>
</body>

</html>
